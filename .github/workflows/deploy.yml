name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]  # 当你推送代码到main分支时触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # GitHub的服务器
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        cd frontend
        npm install --legacy-peer-deps
        
    - name: Build project
      run: |
        cd frontend
        npm run build
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./frontend/dist  # 打包后的文件夹